name: Build iOS App (.ipa)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        brew install automake libtool pkg-config libffi
        python3 -m pip install --upgrade pip setuptools wheel

    - name: Install Kivy-iOS and Cython Explicitly
      run: |
        python3 -m pip install "cython<3.0.0" 
        python3 -m pip install "kivy-ios>=3.0.0"
        python3 -m pip install "kivy" "kivymd"

    - name: Configure and Create Xcode Project
      run: |
        # ORDER FIXED: Pehle python3 aur baqi recipes compile hongi, phir project create hoga
        python3 -m kivy_ios.toolchain build python3
        python3 -m kivy_ios.toolchain build kivy
        python3 -m kivy_ios.toolchain build kivymd
        
        # Ab project easily create ho jayega bina recipe error ke
        python3 -m kivy_ios.toolchain create StateLifeApp .

    - name: Archive Production Build (.ipa artifact)
      uses: actions/upload-artifact@v4
      with:
        name: StateLifeApp-iOS
        path: build/
