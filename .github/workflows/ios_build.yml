name: Build iOS App (.ipa)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        brew install automake libtool pkg-config libffi
        python3 -m pip install --upgrade pip setuptools wheel

    - name: Install Kivy-iOS and Cython Explicitly
      run: |
        # Cython aur Kivy-ios ko direct python3 context mein force install karna
        python3 -m pip install "cython<3.0.0" 
        python3 -m pip install "kivy-ios>=3.0.0"
        python3 -m pip install kivy kivymd

    - name: Configure and Create Xcode Project
      run: |
        # Explicit python call taake toolchain ko cython ka environment 100% mile
        python3 -m kivy_ios.toolchain create StateLifeApp .
        python3 -m kivy_ios.toolchain build kivy
        python3 -m kivy_ios.toolchain build kivymd

    - name: Archive Production Build (.ipa artifact)
      uses: actions/upload-artifact@v4
      with:
        name: StateLifeApp-iOS
        path: build/
